<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АИС «АвтоСервис-Клиент»</title>
    <style>
        :root {
            --primary: #1976D2; --primary-dark: #1565C0; --success: #4CAF50; --danger: #F44336;
            --warning: #FF9800; --bg: #F5F5F5; --white: #FFFFFF; --text: #212121;
            --text-secondary: #757575; --border: #E0E0E0; --shadow: 0 2px 8px rgba(0,0,0,0.10);
            --radius: 8px; --radius-sm: 4px; --menu-width: 240px; --header-height: 56px;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}
        .login-container{display:flex;min-height:100vh;align-items:center;justify-content:center;background:linear-gradient(135deg,#1565C0,#1976D2,#1E88E5);padding:20px;}
        .login-card{background:var(--white);border-radius:12px;box-shadow:0 16px 48px rgba(0,0,0,0.2);padding:40px;width:100%;max-width:420px;}
        .login-logo{text-align:center;margin-bottom:32px;}
        .login-logo .logo-circle{width:64px;height:64px;background:var(--primary);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:12px;}
        .login-title{font-size:22px;font-weight:600;}
        .login-subtitle{font-size:13px;color:var(--text-secondary);margin-top:4px;}
        .form-group{margin-bottom:18px;}
        .form-label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;}
        .form-input,.form-select{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;}
        .form-input:focus,.form-select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(25,118,210,0.10);}
        .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;font-weight:500;font-family:inherit;white-space:nowrap;transition:0.2s;}
        .btn-primary{background:var(--primary);color:#fff;}.btn-primary:hover{background:var(--primary-dark);}
        .btn-success{background:var(--success);color:#fff;}.btn-success:hover{background:#43A047;}
        .btn-danger{background:var(--danger);color:#fff;}.btn-danger:hover{background:#E53935;}
        .btn-outline{background:var(--white);border:1px solid var(--border);color:var(--text);}.btn-outline:hover{background:#F5F5F5;}
        .btn-lg{padding:12px 24px;font-size:15px;}.btn-sm{padding:4px 10px;font-size:12px;}
        .btn-login{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:500;cursor:pointer;}
        .btn-login:hover{background:var(--primary-dark);}
        .login-error{background:#FFEBEE;color:#C62828;padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:16px;display:none;}
        .login-error.show{display:block;}
        .app-layout{display:none;}.app-layout.active{display:flex;min-height:100vh;}
        .sidebar{width:var(--menu-width);background:#263238;color:#ECEFF1;position:fixed;top:0;left:0;bottom:0;z-index:100;display:flex;flex-direction:column;}
        .sidebar-logo{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.08);font-size:16px;font-weight:600;}
        .sidebar-logo .logo-icon{width:32px;height:32px;background:var(--primary);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:18px;}
        .sidebar-nav{flex:1;padding:10px 0;overflow-y:auto;}
        .sidebar-nav a{display:flex;align-items:center;gap:12px;padding:11px 20px;color:#B0BEC5;text-decoration:none;font-size:14px;cursor:pointer;border-left:3px solid transparent;}
        .sidebar-nav a:hover{background:rgba(255,255,255,0.04);color:#ECEFF1;}
        .sidebar-nav a.active{background:rgba(25,118,210,0.15);color:#64B5F6;border-left-color:var(--primary);font-weight:500;}
        .nav-section{padding:16px 20px 6px;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#78909C;font-weight:600;}
        .main{flex:1;margin-left:var(--menu-width);display:flex;flex-direction:column;min-height:100vh;}
        .header{height:var(--header-height);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50;}
        .header-title{font-size:18px;font-weight:500;}.header-right{display:flex;align-items:center;gap:16px;}
        .user-avatar{width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;}
        .btn-logout{background:none;border:1px solid var(--border);padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text-secondary);}
        .btn-logout:hover{color:var(--danger);border-color:var(--danger);}
        .breadcrumbs{padding:12px 24px;font-size:13px;color:var(--text-secondary);}
        .breadcrumbs a{color:var(--primary);cursor:pointer;}
        .content{flex:1;padding:0 24px 24px;}
        .card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px;}
        .card-header{font-size:16px;font-weight:500;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
        .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
        .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
        table{width:100%;border-collapse:collapse;font-size:13px;}
        table th{background:#FAFAFA;padding:10px 12px;text-align:left;font-weight:600;border-bottom:2px solid var(--border);}
        table td{padding:10px 12px;border-bottom:1px solid #F5F5F5;}
        table tbody tr{cursor:pointer;transition:0.15s;}table tbody tr:hover{background:#F5F8FF;}
        .status{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:12px;font-size:12px;font-weight:500;}
        .status-dot{width:8px;height:8px;border-radius:50%;}
        .status-accepted{background:#E3F2FD;color:#1565C0;}.status-accepted .status-dot{background:#2196F3;}
        .status-in_progress{background:#FFF3E0;color:#E65100;}.status-in_progress .status-dot{background:#FF9800;}
        .status-waiting_parts{background:#FFEBEE;color:#C62828;}.status-waiting_parts .status-dot{background:#F44336;}
        .status-completed{background:#E8F5E9;color:#2E7D32;}.status-completed .status-dot{background:#4CAF50;}
        .status-delivered,.status-closed{background:#ECEFF1;color:#546E7A;}.status-delivered .status-dot,.status-closed .status-dot{background:#9E9E9E;}
        .toast{position:fixed;top:20px;right:20px;padding:14px 24px;border-radius:var(--radius);color:#fff;font-size:14px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,0.15);z-index:200;animation:slideIn 0.3s ease;max-width:400px;}
        @keyframes slideIn{from{transform:translateX(120%);opacity:0;}to{transform:translateX(0);opacity:1;}}
        .toast-success{background:var(--success);}.toast-error{background:var(--danger);}.toast-warning{background:var(--warning);color:#212121;}
        .alert{padding:12px 16px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
        .alert-warning{background:#FFF8E1;border:1px solid #FFE082;color:#F57F17;}
        .text-right{text-align:right;}.text-muted{color:var(--text-secondary);}.fw-500{font-weight:500;}
        .mt-8{margin-top:8px;}.mt-16{margin-top:16px;}.mb-16{margin-bottom:16px;}
        .gap-8{display:flex;gap:8px;flex-wrap:wrap;}
        .flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
        .hidden{display:none!important;}
        .tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:16px;}
        .tab{padding:10px 20px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-weight:500;font-size:14px;color:var(--text-secondary);}
        .tab:hover{color:var(--text);}.tab.active{color:var(--primary);border-bottom-color:var(--primary);}
    </style>
</head>
<body>
<div class="login-container" id="login-page">
    <div class="login-card">
        <div class="login-logo"><div class="logo-circle">🔧</div><div class="login-title">АвтоСервис-Клиент</div><div class="login-subtitle">АИС управления заказами</div></div>
        <form onsubmit="handleLogin(event)">
            <div class="form-group"><label class="form-label">Логин</label><input type="text" class="form-input" id="login-input" required></div>
            <div class="form-group"><label class="form-label">Пароль</label><input type="password" class="form-input" id="password-input" required></div>
            <div class="login-error" id="login-error">Неверный логин или пароль</div>
            <button type="submit" class="btn-login">Войти</button>
        </form>
    </div>
</div>

<div class="app-layout" id="app-layout">
    <aside class="sidebar">
        <div class="sidebar-logo"><div class="logo-icon">🔧</div>АвтоСервис</div>
        <nav class="sidebar-nav">
            <a data-page="dashboard" class="active"><span>📊</span> Главная</a>
            <div class="nav-section">Управление</div>
            <a data-page="clients"><span>👥</span> Клиенты</a>
            <a data-page="orders"><span>📋</span> Заказы</a>
            <a data-page="stock"><span>📦</span> Склад</a>
            <div class="nav-section">Финансы</div>
            <a data-page="payments"><span>💰</span> Расчеты</a>
            <a data-page="reports"><span>📈</span> Отчеты</a>
        </nav>
    </aside>
    <main class="main">
        <header class="header"><span class="header-title">АИС «АвтоСервис-Клиент»</span><div class="header-right"><div style="display:flex;align-items:center;gap:8px;"><div class="user-avatar" id="user-avatar-init"></div><div><div style="font-weight:500;" id="user-name"></div><div style="font-size:11px;" id="user-role"></div></div></div><button class="btn-logout" onclick="logout()">Выйти</button></div></header>
        <div class="breadcrumbs"><a onclick="navigateTo('dashboard')">Главная</a><span> › </span><span id="breadcrumb-current">Главная</span></div>
        <div class="content" id="app-content"></div>
    </main>
    <button style="position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;font-size:24px;box-shadow:0 4px 12px rgba(25,118,210,0.4);z-index:99;padding:0;display:flex;align-items:center;justify-content:center;background:var(--primary);color:#fff;border:none;cursor:pointer;" onclick="navigateTo('new-order')">+</button>
</div>
<div id="toast-container"></div>

<script>
// ==================== API для работы с БД ====================
const API_URL = 'http://localhost/car_service/api.php';

async function apiCall(method, table, data = null, id = null) {
    let url = `${API_URL}?table=${table}`;
    if (id) url += `&id=${id}`;
    
    const options = {
        method: method,
        headers: { 'Content-Type': 'application/json' }
    };
    if (data && (method === 'POST' || method === 'PUT')) {
        options.body = JSON.stringify(data);
    }
    try {
        const res = await fetch(url, options);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
    } catch (e) {
        console.error('API Error:', e);
        showToast('Ошибка соединения с БД', 'error');
        return null;
    }
}

// ==================== ГЛОБАЛЬНОЕ СОСТОЯНИЕ ====================
let currentUser = null;
let currentPage = 'dashboard';
let currentOrderId = null;
let newOrderServices = [];
let newOrderParts = [];
let selectedClient = null;

// Кеш данных
let cache = {};

async function loadTable(table) {
    const data = await apiCall('GET', table);
    cache[table] = data || [];
    return cache[table];
}

function getCached(table) { return cache[table] || []; }

// ==================== АВТОРИЗАЦИЯ ====================
async function handleLogin(e) {
    e.preventDefault();
    const login = document.getElementById('login-input').value.trim();
    const password = document.getElementById('password-input').value;
    const employees = await loadTable('employees');
    const user = employees.find(u => u.login === login && u.password_hash === password && u.is_active == 1);
    if (!user) { document.getElementById('login-error').classList.add('show'); return; }
    currentUser = user;
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('app-layout').classList.add('active');
    document.getElementById('user-avatar-init').textContent = user.full_name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
    document.getElementById('user-name').textContent = user.full_name;
    const roleMap = {admin:'Администратор',manager:'Менеджер',storekeeper:'Кладовщик',accountant:'Бухгалтер',mechanic:'Механик'};
    document.getElementById('user-role').textContent = roleMap[user.role]||user.role;
    updateMenuByRole();
    await navigateTo('dashboard');
    showToast(`Добро пожаловать, ${user.full_name}!`, 'success');
}

function logout() {
    if(confirm('Выйти?')) {
        currentUser = null; cache = {};
        document.getElementById('app-layout').classList.remove('active');
        document.getElementById('login-page').style.display = 'flex';
    }
}

function updateMenuByRole() {
    if(!currentUser) return;
    const access = {admin:['dashboard','clients','orders','stock','payments','reports'],manager:['dashboard','clients','orders','new-order','reports'],storekeeper:['dashboard','stock'],accountant:['dashboard','payments','reports'],mechanic:['dashboard','orders']};
    const allowed = access[currentUser.role] || [];
    document.querySelectorAll('.sidebar-nav a[data-page]').forEach(link => {
        link.style.display = allowed.includes(link.dataset.page) ? '' : 'none';
    });
}

// ==================== УВЕДОМЛЕНИЯ ====================
function showToast(msg, type='success') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.3s';},2500);
    setTimeout(()=>t.remove(),2800);
}

// ==================== НАВИГАЦИЯ ====================
async function navigateTo(page) {
    if(!currentUser) return;
    currentPage = page;
    document.querySelectorAll('.sidebar-nav a[data-page]').forEach(l=>l.classList.remove('active'));
    const link = document.querySelector(`.sidebar-nav a[data-page="${page}"]`);
    if(link) link.classList.add('active');
    if(page==='order-card'||page==='new-order'){
        const ol = document.querySelector('.sidebar-nav a[data-page="orders"]');
        if(ol) ol.classList.add('active');
    }
    const map = {dashboard:'Главная',clients:'Клиенты',orders:'Заказы','order-card':'Заказ','new-order':'Новый заказ',stock:'Склад',payments:'Расчеты',reports:'Отчеты'};
    document.getElementById('breadcrumb-current').textContent = map[page]||page;
    await renderPage(page);
}

async function renderPage(page) {
    const c = document.getElementById('app-content');
    switch(page) {
        case 'dashboard': c.innerHTML = await renderDashboard(); break;
        case 'clients': c.innerHTML = await renderClients(); break;
        case 'orders': c.innerHTML = await renderOrders(); break;
        case 'order-card': c.innerHTML = await renderOrderCard(currentOrderId); break;
        case 'new-order': c.innerHTML = renderNewOrder(); break;
        case 'stock': c.innerHTML = await renderStock(); break;
        case 'payments': c.innerHTML = await renderPayments(); break;
        case 'reports': c.innerHTML = await renderReports(); break;
        default: c.innerHTML = '<div class="card"><p class="text-muted">Раздел в разработке</p></div>';
    }
}

function getStatusClass(s) {
    const m = {accepted:'status-accepted',in_progress:'status-in_progress',waiting_parts:'status-waiting_parts',completed:'status-completed',delivered:'status-delivered',closed:'status-closed'};
    return m[s]||'status-accepted';
}
function getStatusText(s) {
    const m = {accepted:'Принят',in_progress:'В работе',waiting_parts:'Ожидание запчастей',completed:'Выполнен',delivered:'Выдан',closed:'Закрыт'};
    return m[s]||s;
}

// ==================== DASHBOARD ====================
async function renderDashboard() {
    const orders = await loadTable('orders');
    const parts = await loadTable('parts');
    const payments = await loadTable('payments');
    const counts = {accepted:0,in_progress:0,waiting_parts:0,completed:0};
    orders.forEach(o=>{if(counts[o.status]!==undefined)counts[o.status]++;});
    const alerts = parts.filter(p=>parseFloat(p.stock_quantity) < parseFloat(p.min_stock));
    const revenue = payments.filter(p=>p.status==='paid').reduce((s,p)=>s+parseFloat(p.amount),0);
    return `
    <div class="card"><div class="card-header">Быстрый поиск</div><div class="gap-8"><input type="text" class="form-input" id="quick-search" placeholder="Телефон или госномер..." style="max-width:400px;"><button class="btn btn-primary" onclick="quickSearch()">🔍 Найти</button></div><div id="quick-search-result" class="mt-16"></div></div>
    <div class="card"><div class="card-header">Текущие заказы</div><div class="grid-4">
      <div style="background:#E3F2FD;padding:16px;border-radius:8px;text-align:center;cursor:pointer;" onclick="navigateTo('orders')"><div style="font-size:28px;font-weight:700;color:#1976D2;">${counts.accepted}</div><div style="font-size:12px;color:#1565C0;">Принято</div></div>
      <div style="background:#FFF3E0;padding:16px;border-radius:8px;text-align:center;cursor:pointer;" onclick="navigateTo('orders')"><div style="font-size:28px;font-weight:700;color:#FF9800;">${counts.in_progress}</div><div style="font-size:12px;color:#E65100;">В работе</div></div>
      <div style="background:#FFEBEE;padding:16px;border-radius:8px;text-align:center;cursor:pointer;" onclick="navigateTo('orders')"><div style="font-size:28px;font-weight:700;color:#F44336;">${counts.waiting_parts}</div><div style="font-size:12px;color:#C62828;">Ожидают запчасти</div></div>
      <div style="background:#E8F5E9;padding:16px;border-radius:8px;text-align:center;cursor:pointer;" onclick="navigateTo('orders')"><div style="font-size:28px;font-weight:700;color:#4CAF50;">${counts.completed}</div><div style="font-size:12px;color:#2E7D32;">Выполнено</div></div>
    </div></div>
    <div class="card"><div class="card-header">Уведомления об остатках</div>${alerts.length?alerts.map(s=>`<div class="alert alert-warning">⚠️ ${s.name} — остаток ${s.stock_quantity} (мин. ${s.min_stock})</div>`).join(''):'<p class="text-muted">Все остатки в норме</p>'}</div>
    <div class="gap-8"><button class="btn btn-primary btn-lg" onclick="navigateTo('new-order')">➕ Новый заказ</button></div>`;
}

async function quickSearch() {
    const q = document.getElementById('quick-search').value.trim().toLowerCase();
    const r = document.getElementById('quick-search-result');
    if(!q){r.innerHTML='';return;}
    const clients = await loadTable('clients');
    const found = clients.filter(c=>c.phone.toLowerCase().includes(q)||c.full_name.toLowerCase().includes(q)||c.car_plate.toLowerCase().includes(q));
    r.innerHTML = found.length ? found.map(c=>`<div class="card" style="cursor:pointer;padding:10px;" onclick="selectClientForOrder(${c.id})"><b>${c.full_name}</b> — ${c.phone} | ${c.car_brand} ${c.car_model} (${c.car_plate})</div>`).join('') : '<p class="text-muted">Ничего не найдено</p>';
}

function selectClientForOrder(id) {
    getCached('clients').find(c=>c.id===id);
    selectedClient = getCached('clients').find(c=>c.id===id);
    newOrderServices = []; newOrderParts = [];
    navigateTo('new-order');
}

// ==================== КЛИЕНТЫ ====================
async function renderClients() {
    const clients = await loadTable('clients');
    return `<div class="card"><div class="card-header">Картотека клиентов<div class="gap-8"><input type="text" class="form-input" id="client-search" placeholder="Поиск..." style="max-width:300px;" oninput="filterClients()"><button class="btn btn-success btn-sm" onclick="addClient()">+ Добавить</button></div></div><div class="table-wrap"><table><thead><tr><th>ФИО</th><th>Телефон</th><th>Авто</th><th>Госномер</th><th>Тип</th></tr></thead><tbody id="clients-tbody">${clients.map(c=>`<tr onclick="selectClientForOrder(${c.id})"><td>${c.full_name}</td><td>${c.phone}</td><td>${c.car_brand} ${c.car_model}</td><td>${c.car_plate}</td><td>${c.type==='company'?'Юрлицо':'Физлицо'}</td></tr>`).join('')}</tbody></table></div></div>`;
}

function filterClients() {
    const q = document.getElementById('client-search').value.toLowerCase();
    const t = document.getElementById('clients-tbody');
    if(t) t.innerHTML = getCached('clients').filter(c=>c.full_name.toLowerCase().includes(q)||c.phone.includes(q)||c.car_plate.toLowerCase().includes(q)).map(c=>`<tr onclick="selectClientForOrder(${c.id})"><td>${c.full_name}</td><td>${c.phone}</td><td>${c.car_brand} ${c.car_model}</td><td>${c.car_plate}</td><td>${c.type==='company'?'Юрлицо':'Физлицо'}</td></tr>`).join('');
}

async function addClient() {
    const name = prompt('ФИО:'); if(!name) return;
    const phone = prompt('Телефон:'); if(!phone) return;
    const plate = prompt('Госномер:'); if(!plate) return;
    const brand = prompt('Марка авто:'); if(!brand) return;
    const model = prompt('Модель:'); if(!model) return;
    await apiCall('POST', 'clients', {full_name:name,phone,email:'',address:'',type:'individual',company_name:null,inn:null,car_plate:plate,car_vin:'',car_brand:brand,car_model:model,car_year:2024,car_color:'',car_mileage:0});
    showToast('Клиент добавлен и сохранен в БД!', 'success');
    await navigateTo('clients');
}

// ==================== ЗАКАЗЫ ====================
async function renderOrders() {
    const orders = await loadTable('orders');
    const clients = await loadTable('clients');
    return `<div class="card"><div class="card-header">Список заказов<div class="gap-8"><select class="form-select" id="order-filter" onchange="filterOrders()" style="max-width:160px;"><option value="all">Все</option><option value="accepted">Принят</option><option value="in_progress">В работе</option><option value="completed">Выполнен</option></select><button class="btn btn-primary btn-sm" onclick="navigateTo('new-order')">+ Новый</button></div></div><div class="table-wrap"><table><thead><tr><th>№</th><th>Дата</th><th>Клиент</th><th>Авто</th><th>Статус</th><th>Сумма</th></tr></thead><tbody id="orders-tbody">${orders.map(o=>{const c=clients.find(x=>x.id==o.client_id);const total=parseFloat(o.total_services)+parseFloat(o.total_parts);const final=total*(1-parseFloat(o.discount_percent)/100);return`<tr onclick="openOrder(${o.id})"><td>${o.id}</td><td>${o.created_at?.split(' ')[0]||''}</td><td>${c?c.full_name:'?'}</td><td>${c?c.car_plate:'?'}</td><td><span class="status ${getStatusClass(o.status)}"><span class="status-dot"></span>${getStatusText(o.status)}</span></td><td>${final.toLocaleString()} ₽</td></tr>`;}).join('')}</tbody></table></div></div>`;
}

function filterOrders(){const f=document.getElementById('order-filter').value;const t=document.getElementById('orders-tbody');if(!t)return;const filtered=f==='all'?getCached('orders'):getCached('orders').filter(o=>o.status===f);const clients=getCached('clients');t.innerHTML=filtered.map(o=>{const c=clients.find(x=>x.id==o.client_id);const total=parseFloat(o.total_services)+parseFloat(o.total_parts);const final=total*(1-parseFloat(o.discount_percent)/100);return`<tr onclick="openOrder(${o.id})"><td>${o.id}</td><td>${o.created_at?.split(' ')[0]||''}</td><td>${c?c.full_name:'?'}</td><td>${c?c.car_plate:'?'}</td><td><span class="status ${getStatusClass(o.status)}"><span class="status-dot"></span>${getStatusText(o.status)}</span></td><td>${final.toLocaleString()} ₽</td></tr>`;}).join('');}

function openOrder(id) { currentOrderId = id; navigateTo('order-card'); }

async function renderOrderCard(id) {
    const orders = await loadTable('orders');
    const clients = await loadTable('clients');
    const items = await loadTable('order_items');
    const services = await loadTable('services');
    const parts = await loadTable('parts');
    const history = await loadTable('order_history');
    const o = orders.find(x=>x.id==id);
    if(!o) return '<p>Заказ не найден</p>';
    const c = clients.find(x=>x.id==o.client_id);
    const orderItems = items.filter(x=>x.order_id==id);
    const orderHistory = history.filter(x=>x.order_id==id);
    const total = parseFloat(o.total_services)+parseFloat(o.total_parts);
    const final = total*(1-parseFloat(o.discount_percent)/100);
    return `
    <div class="card"><div class="card-header"><span>Заказ №${o.id} от ${o.created_at?.split(' ')[0]||''}</span><span class="status ${getStatusClass(o.status)}"><span class="status-dot"></span>${getStatusText(o.status)}</span></div>
    <div class="grid-2 mb-16"><div><div class="form-label">Клиент</div><div style="font-weight:500;">${c?c.full_name:'?'}</div><div class="text-muted">${c?c.phone:''}</div></div><div><div class="form-label">Автомобиль</div><div style="font-weight:500;">${c?c.car_brand+' '+c.car_model:''}</div><div class="text-muted">${c?c.car_plate:''}</div></div></div>
    <div class="tabs" id="order-tabs"><div class="tab active" onclick="switchOrderTab('services',${o.id})">Услуги</div><div class="tab" onclick="switchOrderTab('parts',${o.id})">Запчасти</div><div class="tab" onclick="switchOrderTab('history',${o.id})">История</div></div>
    <div id="order-tab-content-${o.id}">${orderItems.filter(x=>x.item_type==='service').map(x=>{const s=services.find(y=>y.id==x.service_id);return`<div style="padding:6px 0;">${s?s.name:'?'} — ${x.quantity} × ${parseFloat(x.unit_price).toLocaleString()} ₽ = <b>${parseFloat(x.quantity*x.unit_price).toLocaleString()} ₽</b></div>`;}).join('')}</div>
    <div class="text-right mt-16 fw-500">Услуги: ${parseFloat(o.total_services).toLocaleString()} ₽ | Запчасти: ${parseFloat(o.total_parts).toLocaleString()} ₽ | Итого: ${final.toLocaleString()} ₽</div>
    <div class="gap-8 mt-16"><button class="btn btn-primary btn-sm" onclick="changeOrderStatus(${o.id})">Изменить статус</button><button class="btn btn-outline btn-sm" onclick="showToast('Документы отправлены на печать','success')">Печать</button><button class="btn btn-success btn-sm" onclick="acceptPayment(${o.id})">Принять оплату</button><button class="btn btn-danger btn-sm" onclick="closeOrder(${o.id})">Закрыть</button></div></div>`;
}

function switchOrderTab(tab, oid) {
    const items = getCached('order_items').filter(x=>x.order_id==oid);
    const el = document.getElementById('order-tab-content-'+oid);
    if(tab==='services') el.innerHTML = items.filter(x=>x.item_type==='service').map(x=>{const s=getCached('services').find(y=>y.id==x.service_id);return`<div style="padding:6px 0;">${s?s.name:'?'} — ${x.quantity} × ${parseFloat(x.unit_price).toLocaleString()} ₽ = <b>${parseFloat(x.quantity*x.unit_price).toLocaleString()} ₽</b></div>`;}).join('');
    if(tab==='parts') el.innerHTML = items.filter(x=>x.item_type==='part').map(x=>{const p=getCached('parts').find(y=>y.id==x.part_id);return`<div style="padding:6px 0;">${p?p.article:'?'} ${p?p.name:'?'} — ${x.quantity} × ${parseFloat(x.unit_price).toLocaleString()} ₽ = <b>${parseFloat(x.quantity*x.unit_price).toLocaleString()} ₽</b></div>`;}).join('');
    if(tab==='history') el.innerHTML = getCached('order_history').filter(x=>x.order_id===oid).map(h=>`<div style="padding:6px 0;">${h.changed_at} — <b>${h.status}</b></div>`).join('');
    document.querySelectorAll('#order-tabs .tab').forEach(t=>t.classList.remove('active'));
    event.target.classList.add('active');
}

async function changeOrderStatus(id) {
    const o = getCached('orders').find(x=>x.id==id);
    if(!o) return;
    const st = ['accepted','in_progress','waiting_parts','completed','delivered','closed'];
    const i = st.indexOf(o.status);
    const newStatus = st[(i+1)%st.length];
    await apiCall('PUT', 'orders', {status:newStatus}, id);
    await apiCall('POST', 'order_history', {order_id:id,status:getStatusText(newStatus),changed_by:currentUser.id,changed_at:new Date().toLocaleString('ru-RU')});
    showToast(`Статус изменен на «${getStatusText(newStatus)}»`, 'success');
    await navigateTo('order-card');
}

async function acceptPayment(id) {
    const amount = prompt('Сумма оплаты:');
    if(!amount) return;
    await apiCall('POST', 'payments', {order_id:id,method:'card',amount:parseFloat(amount),status:'paid',payment_date:new Date().toLocaleString('ru-RU')});
    showToast(`Оплата ${parseInt(amount).toLocaleString()} ₽ принята`, 'success');
    await navigateTo('order-card');
}

async function closeOrder(id) {
    if(confirm(`Закрыть заказ №${id}?`)) {
        await apiCall('PUT', 'orders', {status:'closed'}, id);
        await apiCall('POST', 'order_history', {order_id:id,status:'Закрыт',changed_by:currentUser.id,changed_at:new Date().toLocaleString('ru-RU')});
        showToast('Заказ закрыт', 'success');
        await navigateTo('order-card');
    }
}

// ==================== НОВЫЙ ЗАКАЗ ====================
function renderNewOrder() {
    if(!selectedClient){const clients=getCached('clients');selectedClient=clients[0];}
    const c = selectedClient;
    const sTotal = newOrderServices.reduce((s,v)=>s+v.quantity*v.unit_price,0);
    const pTotal = newOrderParts.reduce((s,v)=>s+v.quantity*v.unit_price,0);
    return `
    <div class="toast toast-success" style="position:static;margin-bottom:16px;">✓ Клиент: ${c.full_name}, ${c.car_brand} ${c.car_model} (${c.car_plate})</div>
    <div class="card"><div class="card-header">Услуги <button class="btn btn-outline btn-sm" onclick="addNewOrderService()">+ Добавить</button></div>${newOrderServices.length?newOrderServices.map((s,i)=>`<div style="padding:6px 0;">${s.name} — ${s.quantity}ч × ${parseFloat(s.unit_price).toLocaleString()}₽ = ${(s.quantity*s.unit_price).toLocaleString()} ₽ <button class="btn btn-danger btn-sm" onclick="removeNewOrderService(${i})">✕</button></div>`).join(''):'<p class="text-muted">Нет услуг</p>'}<div class="text-right fw-500">Итого услуг: ${sTotal.toLocaleString()} ₽</div></div>
    <div class="card"><div class="card-header">Запчасти <button class="btn btn-outline btn-sm" onclick="addNewOrderPart()">+ Добавить</button></div>${newOrderParts.length?newOrderParts.map((p,i)=>{const st=getCached('parts').find(x=>x.id==p.part_id);const low=st&&st.stock_quantity<st.min_stock;return`<div style="padding:6px 0;${low?'background:#FFF5F5;':''}">${st?st.article:'?'} ${p.name} — ${p.quantity} × ${parseFloat(p.unit_price).toLocaleString()}₽ = ${(p.quantity*p.unit_price).toLocaleString()} ₽ ${low?'⚠️ Низкий остаток':''} <button class="btn btn-danger btn-sm" onclick="removeNewOrderPart(${i})">✕</button></div>`;}).join(''):'<p class="text-muted">Нет запчастей</p>'}<div class="text-right fw-500">Итого запчастей: ${pTotal.toLocaleString()} ₽</div></div>
    <div class="card"><div class="card-header">Расчет</div><div style="text-align:right;font-size:20px;font-weight:600;color:var(--primary);">Итого: ${(sTotal+pTotal).toLocaleString()} ₽</div></div>
    <div class="flex-between mt-16"><button class="btn btn-outline btn-lg" onclick="navigateTo('orders')">← Назад</button><button class="btn btn-success btn-lg" onclick="saveNewOrder()">Сохранить заказ</button></div>`;
}

function addNewOrderService(){const s=getCached('services').filter(x=>x.is_active==1);const sid=prompt('ID услуги:\n'+s.map(x=>`${x.id}: ${x.name} (${parseFloat(x.hourly_rate).toLocaleString()} ₽/ч)`).join('\n'));if(!sid)return;const sv=s.find(x=>x.id==parseInt(sid));if(!sv)return;const qty=parseFloat(prompt('Нормо-часы:'));if(isNaN(qty))return;newOrderServices.push({service_id:sv.id,name:sv.name,quantity:qty,unit_price:sv.hourly_rate});navigateTo('new-order');}
function removeNewOrderService(i){newOrderServices.splice(i,1);navigateTo('new-order');}
function addNewOrderPart(){const p=getCached('parts');const pid=prompt('ID запчасти:\n'+p.map(x=>`${x.id}: ${x.article} ${x.name} (остаток: ${x.stock_quantity})`).join('\n'));if(!pid)return;const pt=p.find(x=>x.id==parseInt(pid));if(!pt)return;const qty=parseFloat(prompt('Количество:'));if(isNaN(qty))return;if(qty>pt.stock_quantity){showToast('Недостаточно на складе!','error');return;}newOrderParts.push({part_id:pt.id,name:pt.name,article:pt.article,quantity:qty,unit_price:pt.sale_price});navigateTo('new-order');}
function removeNewOrderPart(i){newOrderParts.splice(i,1);navigateTo('new-order');}

async function saveNewOrder() {
    const sTotal = newOrderServices.reduce((s,v)=>s+v.quantity*v.unit_price,0);
    const pTotal = newOrderParts.reduce((s,v)=>s+v.quantity*v.unit_price,0);
    const newOrder = await apiCall('POST', 'orders', {
        client_id:selectedClient.id, manager_id:currentUser.id, mechanic_id:null, status:'accepted',
        discount_percent:0, total_services:sTotal, total_parts:pTotal, notes:'',
        created_at:new Date().toLocaleString('ru-RU'), completed_at:null
    });
    if(!newOrder) return;
    for(const s of newOrderServices) { await apiCall('POST', 'order_items', {order_id:newOrder.id,item_type:'service',service_id:s.service_id,part_id:null,quantity:s.quantity,unit_price:s.unit_price}); }
    for(const p of newOrderParts) { await apiCall('POST', 'order_items', {order_id:newOrder.id,item_type:'part',service_id:null,part_id:p.part_id,quantity:p.quantity,unit_price:p.unit_price}); const pt = getCached('parts').find(x=>x.id==p.part_id); if(pt) { const newQty = parseFloat(pt.stock_quantity) - p.quantity; await apiCall('PUT', 'parts', {stock_quantity:newQty}, p.part_id); await apiCall('POST', 'stock_movements', {part_id:p.part_id,movement_type:'write_off',quantity:p.quantity,unit_price:p.unit_price,supplier_id:null,order_id:newOrder.id,document_number:'ТН-'+newOrder.id,movement_date:new Date().toISOString().split('T')[0]}); } }
    await apiCall('POST', 'order_history', {order_id:newOrder.id,status:'Принят',changed_by:currentUser.id,changed_at:new Date().toLocaleString('ru-RU')});
    newOrderServices=[]; newOrderParts=[];
    showToast(`Заказ №${newOrder.id} создан и сохранен в БД!`, 'success');
    currentOrderId=newOrder.id; await navigateTo('order-card');
}

// ==================== СКЛАД / РАСЧЕТЫ / ОТЧЕТЫ ====================
async function renderStock() {
    const parts = await loadTable('parts');
    return `<div class="card"><div class="card-header">Склад<div class="gap-8"><input type="text" class="form-input" id="stock-search" placeholder="Поиск..." style="max-width:200px;" oninput="filterStock()"><select class="form-select" id="stock-category" onchange="filterStock()" style="max-width:150px;"><option value="all">Все</option>${[...new Set(parts.map(p=>p.category))].map(c=>`<option>${c}</option>`).join('')}</select></div></div><div class="table-wrap"><table><thead><tr><th>Артикул</th><th>Наименование</th><th>Остаток</th><th>Мин.</th><th>Цена</th></tr></thead><tbody id="stock-tbody">${parts.map(p=>`<tr style="${parseFloat(p.stock_quantity)<parseFloat(p.min_stock)?'background:#FFF5F5;':''}"><td>${p.article}</td><td>${p.name}</td><td>${p.stock_quantity}</td><td>${p.min_stock}</td><td>${parseFloat(p.sale_price).toLocaleString()} ₽</td></tr>`).join('')}</tbody></table></div></div>`;
}
function filterStock(){const q=document.getElementById('stock-search').value.toLowerCase();const cat=document.getElementById('stock-category').value;const t=document.getElementById('stock-tbody');if(t)t.innerHTML=getCached('parts').filter(p=>(cat==='all'||p.category===cat)&&(p.article.toLowerCase().includes(q)||p.name.toLowerCase().includes(q))).map(p=>`<tr style="${parseFloat(p.stock_quantity)<parseFloat(p.min_stock)?'background:#FFF5F5;':''}"><td>${p.article}</td><td>${p.name}</td><td>${p.stock_quantity}</td><td>${p.min_stock}</td><td>${parseFloat(p.sale_price).toLocaleString()} ₽</td></tr>`).join('');}

async function renderPayments(){const payments=await loadTable('payments');const m={cash:'Наличные',card:'Карта',bank_transfer:'Безнал'};return`<div class="card"><div class="card-header">Расчеты</div><div class="table-wrap"><table><thead><tr><th>№</th><th>Заказ</th><th>Метод</th><th>Сумма</th><th>Статус</th><th>Дата</th></tr></thead><tbody>${payments.map(p=>`<tr><td>${p.id}</td><td>Заказ №${p.order_id}</td><td>${m[p.method]||p.method}</td><td>${parseFloat(p.amount).toLocaleString()} ₽</td><td>${p.status==='paid'?'Оплачен':p.status}</td><td>${p.payment_date}</td></tr>`).join('')}</tbody></table></div></div>`;}

async function renderReports(){const orders=await loadTable('orders');const clients=await loadTable('clients');const payments=await loadTable('payments');const rev=payments.filter(p=>p.status==='paid').reduce((s,p)=>s+parseFloat(p.amount),0);return`<div class="card"><div class="card-header">Отчеты</div><div class="table-wrap"><table><thead><tr><th>№</th><th>Дата</th><th>Клиент</th><th>Статус</th><th>Сумма</th></tr></thead><tbody>${orders.map(o=>{const c=clients.find(x=>x.id==o.client_id);const t=parseFloat(o.total_services)+parseFloat(o.total_parts);return`<tr><td>${o.id}</td><td>${o.created_at?.split(' ')[0]||''}</td><td>${c?c.full_name:'?'}</td><td><span class="status ${getStatusClass(o.status)}"><span class="status-dot"></span>${getStatusText(o.status)}</span></td><td>${t.toLocaleString()} ₽</td></tr>`;}).join('')}</tbody></table></div><div class="mt-16 fw-500">Выручка: ${rev.toLocaleString()} ₽</div></div>`;}

// ==================== ИНИЦИАЛИЗАЦИЯ ====================
document.querySelectorAll('.sidebar-nav a[data-page]').forEach(l=>l.addEventListener('click',function(){navigateTo(this.dataset.page);}));
</script>
</body>
</html>
